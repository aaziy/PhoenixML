name: Serve

on:
  push:
    branches: [main]
    paths:
      - "src/phoenixml/api.py"
      - "docker/serve.Dockerfile"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/phoenixml-serve
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/serve.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write job summary
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/phoenixml-serve:latest"
          echo "## Serve Image Built ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`$IMAGE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run locally:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8000:8000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MLFLOW_TRACKING_URI=... \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MLFLOW_TRACKING_USERNAME=... \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MLFLOW_TRACKING_PASSWORD=... \\" >> $GITHUB_STEP_SUMMARY
          echo "  $IMAGE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
